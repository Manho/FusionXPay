spring:
  main:
    banner-mode: off
    log-startup-info: false
    web-application-type: none
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

logging:
  level:
    root: WARN
    org.apache.kafka: WARN

fusionx:
  ai:
    audit:
      # CLI audit is enabled by default from Stage 7 onward so CLI and MCP share one Kafka audit sink.
      enabled: ${FUSIONX_AI_AUDIT_ENABLED:true}
      topic: ${FUSIONX_AI_AUDIT_TOPIC:ai-audit-log}
      reliable: ${FUSIONX_AI_AUDIT_RELIABLE:true}
      send-timeout: ${FUSIONX_AI_AUDIT_SEND_TIMEOUT:1500ms}
    gateway:
      base-url: ${FUSIONX_GATEWAY_BASE_URL:http://localhost:8080}
    cli:
      config-path: ${FUSIONX_CONFIG_PATH:${user.home}/.fusionx/config.json}
