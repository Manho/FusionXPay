spring:
  main:
    banner-mode: off
    log-startup-info: false
    web-application-type: none

logging:
  level:
    root: WARN

fusionx:
  ai:
    gateway:
      base-url: ${FUSIONX_GATEWAY_BASE_URL:http://localhost:8080}
    cli:
      config-path: ${FUSIONX_CONFIG_PATH:${user.home}/.fusionx/config.json}
