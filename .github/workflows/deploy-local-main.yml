name: Deploy Local (Main)

on:
  pull_request:
    branches: [main]
    paths:
      - "pom.xml"
      - "services/**"
      - "common/**"
      - "ai/**"
      - "**/Dockerfile"
      - "docker-compose.always-on.yml"
      - ".env.always-on.example"
      - "scripts/deploy-always-on.sh"
      - "scripts/check-always-on-health.sh"
      - "scripts/deploy-local-main.sh"
      - "scripts/mark-successful-sha.sh"
      - "scripts/rollback-local-main.sh"
      - "docs/deployment/**"
      - ".github/workflows/backend-ci-full.yml"
      - ".github/workflows/docker-build.yml"
      - ".github/workflows/deploy-local-main.yml"
  workflow_run:
    workflows: ["Backend CI Full (Main/Nightly)"]
    types: [completed]
  workflow_dispatch:

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Validate deployment scripts
        run: |
          bash -n scripts/deploy-always-on.sh
          bash -n scripts/check-always-on-health.sh
          bash -n scripts/deploy-local-main.sh
          bash -n scripts/mark-successful-sha.sh
          bash -n scripts/rollback-local-main.sh

      - name: Validate always-on compose profile
        run: |
          docker compose --env-file .env.always-on.example -f docker-compose.always-on.yml config >/dev/null

  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: [self-hosted, linux]
    permissions:
      actions: read
      contents: read
      packages: read
    concurrency:
      group: fusionxpay-main-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify runtime env file exists
        run: |
          if [ ! -f "$HOME/.fusionxpay/.env.always-on" ]; then
            echo "::error title=Missing env file::~/.fusionxpay/.env.always-on not found on self-hosted runner"
            exit 1
          fi

      - name: Show deployment target
        run: |
          echo "Deploying ref: $(git rev-parse HEAD)"
          echo "Deploying image tag: $(git rev-parse --short=7 HEAD)"

      - name: Wait for Docker build workflow to succeed
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v8
        with:
          script: |
            const targetSha = context.payload.workflow_run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowName = 'Docker Build & Push';
            const timeoutMs = 15 * 60 * 1000;
            const pollMs = 15 * 1000;
            const deadline = Date.now() + timeoutMs;

            async function findMatchingRun() {
              const response = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                event: 'push',
                branch: 'main',
                per_page: 100
              });

              return response.data.workflow_runs.find((run) =>
                run.name === workflowName && run.head_sha === targetSha
              );
            }

            while (Date.now() < deadline) {
              const run = await findMatchingRun();

              if (!run) {
                core.info(`Waiting for ${workflowName} run for ${targetSha} to appear...`);
              } else if (run.status !== 'completed') {
                core.info(`Waiting for ${workflowName} run ${run.id}: status=${run.status}`);
              } else if (run.conclusion !== 'success') {
                core.setFailed(`${workflowName} for ${targetSha} finished with conclusion=${run.conclusion}`);
                return;
              } else {
                core.info(`${workflowName} run ${run.id} succeeded for ${targetSha}`);
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, pollMs));
            }

            core.setFailed(`Timed out waiting for ${workflowName} success for ${targetSha}`);

      - name: Deploy latest revision
        run: ./scripts/deploy-local-main.sh "$HOME/.fusionxpay/.env.always-on"

      - name: Smoke check deployment
        run: ./scripts/check-always-on-health.sh "$HOME/.fusionxpay/.env.always-on"

      - name: Mark deployment successful
        if: success()
        run: ./scripts/mark-successful-sha.sh

      - name: Rollback to last successful revision
        if: failure()
        run: ./scripts/rollback-local-main.sh "$HOME/.fusionxpay/.env.always-on"
